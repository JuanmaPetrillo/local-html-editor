<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Local HTML Presentation Editor V2</title>
<style>body{font-family:Segoe UI,Tahoma,sans-serif;margin:0;background:#eef2f7}.top{display:flex;gap:.4rem;flex-wrap:wrap;padding:.6rem;border-bottom:1px solid #cfd8e3;background:#fff}.top button.active{background:#dbeafe}.wrap{display:grid;grid-template-columns:200px 1fr 320px;gap:.6rem;padding:.6rem}.panel{background:#fff;border:1px solid #cfd8e3;border-radius:8px;padding:.6rem}.canvas{width:960px;height:540px;border:1px solid #99a8b9;background:#fff;overflow:hidden;margin:auto}.stage{position:relative}.list{display:flex;flex-direction:column;gap:.3rem;max-height:220px;overflow:auto}.list button.active{background:#dbeafe}.fields{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}.fields label{font-size:.8rem;color:#334155}.fields input,.fields textarea{width:100%;box-sizing:border-box}.status{padding:.5rem;background:#0f172a;color:#e2e8f0;font-size:.9rem}</style>
</head>
<body>
<div class="top"><label>Open HTML <input id="file" type="file" accept=".html,.htm"></label><button id="mode-preview">Preview</button><button id="mode-edit" class="active">Edit</button><button id="add-text">Add Text</button><button id="add-image">Add Image</button><button id="delete" disabled>Delete</button><button id="undo" disabled>Undo</button><button id="redo" disabled>Redo</button><button id="save-project">Save Project</button><button id="open-project">Open Project</button><button id="export">Export HTML</button><input id="open-project-file" type="file" accept=".json" hidden></div>
<div class="wrap"><aside class="panel"><h3>Slides</h3><div id="slides" class="list"></div></aside><main class="panel stage"><iframe id="live-preview-frame" class="canvas" sandbox="allow-scripts" referrerpolicy="no-referrer"></iframe><div id="edit-stage" class="canvas" style="position:relative;padding:0;display:block;"><iframe id="edit-frame" style="position:absolute;inset:0;width:100%;height:100%;border:none;" sandbox="allow-same-origin" referrerpolicy="no-referrer"></iframe><div id="edit-overlay" style="position:absolute;inset:0;cursor:default;"></div><div id="hover-box" style="position:absolute;pointer-events:none;border:1px dashed #94a3b8;display:none;box-sizing:border-box;"></div><div id="selection-box" style="position:absolute;pointer-events:none;border:2px solid #2563eb;display:none;box-sizing:border-box;"></div></div></main><aside class="panel"><h3>Inspector</h3><div>Type: <strong id="ins-type">none</strong></div><div class="fields"><label>X<input id="ins-x" type="number"></label><label>Y<input id="ins-y" type="number"></label><label>W<input id="ins-w" type="number"></label><label>H<input id="ins-h" type="number"></label></div><label>Text<textarea id="ins-text" rows="2"></textarea></label><label>Alt text<input id="ins-alt" type="text"></label><div class="fields"><label>Text color<input id="ins-color" type="color" value="#000000"></label><label>Background<input id="ins-bg" type="color" value="#ffffff"></label><label>Font px<input id="ins-font" type="number" min="8" max="200" value="16"></label><label>Bold<input id="ins-bold" type="checkbox"></label></div><h3>Layers</h3><div id="layers" class="list"></div></aside></div>
<div id="status" class="status">Ready.</div><div id="mode-label" class="status">Safe editing. Scripts are disabled. Click to select; double-click text to edit.</div><div id="selected-state" class="status">Selected: none</div>
<script src="./app-v2.bundle.js"></script>
</body></html>
