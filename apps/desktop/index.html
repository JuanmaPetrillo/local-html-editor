<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local HTML Editor</title>
    <style>
      :root { color-scheme: light; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
      body { margin: 0; background: #f3f5f8; color: #1f2937; }
      main { max-width: 760px; margin: 2rem auto; padding: 1.5rem; background: #fff; border: 1px solid #dbe2ea; border-radius: 12px; box-shadow: 0 6px 24px rgba(15, 23, 42, 0.08); }
      h1, h2 { margin-top: 0; }
      .toolbar { display: flex; gap: 0.75rem; flex-wrap: wrap; }
      button, .open-label { font: inherit; border: 1px solid #bcc8d6; border-radius: 8px; padding: 0.6rem 0.9rem; background: #f8fafc; }
      .open-label { cursor: pointer; display: inline-block; }
      button:disabled { cursor: not-allowed; opacity: 0.65; }
      section { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid #e5ebf1; }
      #file-status { margin-top: 0.75rem; font-weight: 600; }
      #file-details, #file-warning { margin-top: 0.5rem; }
      #file-warning { color: #9a3412; }
      .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>Local HTML Editor</h1>
      <p>Safe local mode: imported content is not executed in this shell.</p>
      <section>
        <div class="toolbar">
          <label class="open-label" for="file-input">Open HTML/ZIP</label>
          <button type="button" disabled>Save</button>
          <button type="button" disabled>Export</button>
        </div>
        <input id="file-input" class="visually-hidden" type="file" />
        <p id="file-status" aria-live="polite">No file selected.</p>
        <p id="file-details">Choose an .html, .htm, or .zip file to start a local project model.</p>
        <p id="file-warning"></p>
      </section>
      <section>
        <h2>Recent Projects</h2>
        <p>No recent projects yet.</p>
      </section>
      <section>
        <h2>Safe Preview</h2>
        <p>Scripts are disabled in safe preview mode.</p>
      </section>
    </main>
    <script type="module" src="./src/app-shell.mjs"></script>
  </body>
</html>
