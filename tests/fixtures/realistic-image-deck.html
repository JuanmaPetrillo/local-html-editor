<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Realistic Image Deck</title></head>
<body>
  <img src="images/team-photo.png" alt="Team photo" class="hero-image" data-asset-id="hero" style="position:absolute;left:80px;top:100px;width:320px;height:180px;border:1px solid #ccc;" />
  <img src="images/team-photo.png" alt="Team photo duplicate" class="hero-image copy" data-asset-id="hero-copy" style="position:absolute;left:420px;top:100px;width:320px;height:180px;border:1px solid #ccc;" />
  <p style="position:absolute;left:80px;top:300px;width:500px;height:40px;">Image caption text.</p>
</body>
</html>
